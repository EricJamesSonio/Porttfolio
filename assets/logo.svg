<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56" fill="none">
  <defs>

    <!-- Gold: warm amber tones only, no white -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#8a6f42"/>
    </linearGradient>

    <!-- Violet -->
    <linearGradient id="violet" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7b6cfa"/>
      <stop offset="100%" stop-color="#a99ef5"/>
    </linearGradient>

    <!-- Diamond fill: violet-to-dark blend -->
    <linearGradient id="fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0e0e1c"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>

    <!-- Soft glow on letters -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Violet edge glow -->
    <filter id="vglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- ── Outer diamond — violet glowing border ── -->
  <polygon
    points="28,1 55,28 28,55 1,28"
    stroke="url(#violet)"
    stroke-width="1.4"
    fill="url(#fill)"
    filter="url(#vglow)"
  />

  <!-- ── Inner diamond — gold hairline ── -->
  <polygon
    points="28,9 47,28 28,47 9,28"
    stroke="url(#gold)"
    stroke-width="0.7"
    fill="none"
    opacity="0.35"
  />

  <!-- ── Corner accent dots — alternating violet / gold ── -->
  <circle cx="28" cy="1"  r="2" fill="url(#violet)" filter="url(#vglow)" opacity="0.95"/>
  <circle cx="55" cy="28" r="2" fill="url(#gold)"   opacity="0.9"/>
  <circle cx="28" cy="55" r="2" fill="url(#violet)" filter="url(#vglow)" opacity="0.95"/>
  <circle cx="1"  cy="28" r="2" fill="url(#gold)"   opacity="0.9"/>

  <!-- ── EJS monogram — gold, centered ── -->
  <g filter="url(#glow)">

    <!-- E  (x 9–17, vertically centered 19–37) -->
    <rect x="9"  y="19"   width="1.7" height="18"  fill="url(#gold)"/>
    <rect x="9"  y="19"   width="8.5" height="1.6" fill="url(#gold)"/>
    <rect x="9"  y="27.2" width="6.5" height="1.6" fill="url(#gold)"/>
    <rect x="9"  y="35.4" width="8.5" height="1.6" fill="url(#gold)"/>

    <!-- J  (x 20–29) -->
    <rect x="20.5" y="19"   width="7.5" height="1.6"  fill="url(#gold)"/>
    <rect x="25.8" y="19"   width="1.7" height="12.5" fill="url(#gold)"/>
    <path
      d="M27.5 31.5 Q27.5 37.5 22 37.5 Q18.5 37.5 18 34.2 L19.8 33.7 Q20 36 22 36 Q25.8 36 25.8 31.5 Z"
      fill="url(#gold)"
    />

    <!-- S  (x 30–46) -->
    <path
      d="M44.5 23.5 Q44.5 19.5 38.5 19.5 Q33.5 19.5 33.5 23.8
         Q33.5 27.2 39.5 28.8 Q46 30.5 46 35
         Q46 39.5 39.5 39.5 Q33 39.5 33 34.5
         L34.9 34.1 Q35.1 37.7 39.5 37.7
         Q44.1 37.7 44.1 35 Q44.1 31.8 38 30.2
         Q31.7 28.5 31.7 23.8 Q31.7 17.8 38.5 17.8
         Q46.3 17.8 46.3 23.5 Z"
      fill="url(#gold)"
    />

  </g>

</svg>
